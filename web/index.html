<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Dejipachi · Informational Engine</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./src/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three":              "https://esm.sh/three@0.160.0",
      "three/addons/":      "https://esm.sh/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="hud" class="hud">
    <div class="hud-row">
      <span class="badge state" id="state-badge">NORMAL</span>
      <span class="badge queue">queue <b id="queue-count">0</b></span>
      <span class="badge balls">tray <b id="tray-count">0</b></span>
    </div>
    <div class="hud-row hud-row-right">
      <span class="badge hint">hold <kbd>SPACE</kbd> to launch · <kbd>R</kbd> resets</span>
    </div>
  </div>

  <div id="reach-banner" class="reach-banner hidden">
    <span id="reach-tier">REACH</span>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
